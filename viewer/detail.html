<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Detail</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="hero">
            <div>
                <p class="eyebrow">Asset Detail</p>
                <h1 id="detailTitle">Loading Asset</h1>
            </div>
            <div class="hero-panel">
                <div class="panel-inline">
                    <p class="panel-title">Navigation</p>
                    <a class="ghost-link" href="./">Back to Assets</a>
                </div>
            </div>
        </header>

        <section class="detail-shell">
            <div class="detail-header">
                <div>
                    <h2>Record</h2>
                    <p id="detailMeta">Loading asset snapshot...</p>
                </div>
            </div>
            <div id="assetDetailGrid" class="detail-grid">
                <div class="detail-empty">Loading asset snapshot...</div>
            </div>
        </section>
    </div>

    <script src="./detail.js"></script>
</body>
</html>
